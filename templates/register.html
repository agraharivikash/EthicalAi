<!DOCTYPE html>
<html>
<head>
    <title>Register | Ethical AI Validator</title>
    <style>
        body {
            background: #0b1020;
            color: #e5e7eb;
            font-family: Arial, sans-serif;
        }
        .box {
            width: 300px;
            margin: 120px auto;
            padding: 20px;
            background: #020617;
            border-radius: 8px;
            text-align: center;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            background: #0f172a;
            border: none;
            color: white;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
        }
        a {
            color: #60a5fa;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Register</h2>
    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>
    <br>
    <a href="/login">Back to login</a>
</div>

</body>
</html>
